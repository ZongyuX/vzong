<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A1128" />
  <meta name="description" content="vzong · AI视频导航 - 本地生成 AI 视频的引导中心与作品展示台。提供 ComfyUI + LTX 教程、Ollama 提示词增强器、个人视频画廊。" />
  <meta name="keywords" content="AI视频,ComfyUI,LTX,Ollama,本地生成,视频教程,提示词增强,画廊" />
  <title>vzong · AI视频导航 | 本地生成 · 云端引导</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4" defer></script>

  <!-- Firebase (compat mode for vanilla JS) - 仅用于可选的云端同步 -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://www.gstatic.com" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Favicon (inline SVG) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230A1128'/%3E%3Cpath d='M30 28 L30 72 L42 72 L42 56 L52 56 L62 72 L76 72 L62 52 Q72 48 72 38 Q72 28 60 28 Z M42 40 L58 40 Q60 40 60 42 L60 46 Q60 48 58 48 L42 48 Z' fill='%2300F0FF'/%3E%3C/svg%3E" />

  <!-- Custom styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-[#0A1128] text-white antialiased min-h-screen">
  <!-- App Root (vanilla JS will render into here) -->
  <div id="app">
    <!-- Boot loader (shown until JS loads) -->
    <div id="boot-loader" class="fixed inset-0 flex items-center justify-center bg-[#0A1128] z-50">
      <div class="flex flex-col items-center gap-4">
        <div class="w-12 h-12 rounded-full border-4 border-[#00F0FF]/20 border-t-[#00F0FF] animate-spin"></div>
        <p class="text-sm text-white/60" data-i18n="common.loading">加载中…</p>
      </div>
    </div>
  </div>

  <!-- Toast notifications container -->
  <div id="toast-container" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

  <!-- Modal container -->
  <div id="modal-root"></div>

  <!-- ===== App Scripts (load order matters) ===== -->
  <script src="firebase-config.js"></script>
  <script src="i18n.js"></script>
  <script src="tutorials.js"></script>
  <script src="work-order.js"></script>
  <script src="ollama.js"></script>
  <script src="gallery-db.js"></script>
  <script src="app.js"></script>
</body>
</html>
